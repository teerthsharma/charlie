# Pre-commit hooks for OmniTopos
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format check
        entry: ruff format --check .
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy type check
        entry: mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest with coverage
        entry: pytest --cov=src/ --cov-report=term-missing
        language: system
        types: [python]
        pass_filenames: false